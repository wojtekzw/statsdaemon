# See docs/examples here:
# http://doc.gitlab.com/ce/ci/quick_start/README.html
# http://doc.gitlab.com/ce/ci/yaml/README.html
#
# Go modules build (no GOPATH gymnastics needed).
stages:
  - build
  - test
  - bench

image: golang:1.24

build:
  stage: build
  tags:
    - test-ci
  script:
    - go build ./...

test:
  stage: test
  tags:
    - test-ci
  script:
    - go vet ./...
    - go test -v -cover ./...
    - GOMAXPROCS=4 go test -race -timeout 120s ./...

bench:
  stage: bench
  tags:
    - test-ci
  script:
    - go test -benchmem -bench=. -run='^$' ./...

test-golang-latest:
  image: golang:latest
  stage: test
  tags:
    - test-ci
  script:
    - go version
    - go test -v -cover ./...
